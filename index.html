<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vidhwaan IAS Library</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <header>
    <h1>📚 Vidhwaan IAS Library</h1>
    <p>India’s Free Knowledge Infrastructure</p>
  </header>

  <div class="controls">
    <input type="text" id="search" placeholder="Search books, subjects..." />
    <select id="subject">
      <option value="">All Subjects</option>
      <option value="history">History</option>
      <option value="polity">Polity</option>
      <option value="economy">Economy</option>
      <option value="science">Science</option>
    </select>
  </div>

  <div id="books"></div>

  <footer>
    <p>Powered by Open Knowledge Sources</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
